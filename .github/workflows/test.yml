name: test

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ./MunicipalityWebSiteCheckTool/MunicipalityWebSiteCheckTool.slnx

      - name: Build
        run: dotnet build ./MunicipalityWebSiteCheckTool/MunicipalityWebSiteCheckTool.slnx -c Release --no-restore

      - name: Test
        run: dotnet test ./MunicipalityWebSiteCheckTool/MunicipalityWebSiteCheckTool.slnx -c Release --no-build
